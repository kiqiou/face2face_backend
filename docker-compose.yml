services:
  web:
    build: ./
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    working_dir: /app
    volumes:
      - .:/app 

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: face2face
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 177886936
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_face2face
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "6060:80"
    depends_on:
      - db

volumes:
  postgres_data:
